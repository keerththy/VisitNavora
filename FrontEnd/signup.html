<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - VisitNavora</title>
    <link rel="stylesheet" href="login.css"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<a href="login.html" class="back-btn">
    <i class="fas fa-arrow-left"></i>
</a>

<div class="login-container">
    <div class="login-box">
        <img src="images/VisitNavora logo.jfif" class="logo">
        <h2>Create Account</h2>
        <p>Join VisitNavora today!</p>

        <form id="signupForm" novalidate>
           <div class="input-box">
             <i class="fas fa-user"></i>
             <input type="text" id="new-username" placeholder="Username" required>
            </div>

            <div class="input-box">
             <i class="fas fa-envelope"></i>
             <input type="email" id="email" placeholder="Email Address" required>
            </div>

            <div class="input-box">
             <i class="fas fa-lock"></i>
             <input type="password" id="new-password" placeholder="Password" required>
            </div>

           <button type="submit" class="login-btn">
             <i class="fas fa-user-plus"></i> Sign Up
           </button>
       </form>

        <p class="signup-link">Already have an account? <a href="login.html">Login</a></p>
        <p class="error" id="signupErrorMsg"></p>
    </div>
</div>

<script src="signup.js"></script>
</body>
</html>
